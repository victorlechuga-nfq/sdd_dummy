name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade pip uv ruff pytest pytest-cov

      - name: Install project (if installable)
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e . || echo "Proyecto aun no instalable -- se omite."
          fi

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: |
          set +e
          pytest --tb=short
          code=$?
          # Codigo 5 = pytest no recogio tests (repo aun sin tests): se considera OK.
          if [ "$code" -eq 5 ]; then echo "Sin tests todavia."; exit 0; fi
          exit $code
